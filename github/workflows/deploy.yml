name: 🚀 Auto-Deploy & Self-Healing Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # تشغيل يدوي
  schedule:
    - cron: '*/30 * * * *'  # كل 30 دقيقة (للتأكد من الاستقرار)

env:
  NODE_VERSION: '20'
  NPM_VERSION: '10'

jobs:
  build-and-deploy:
    name: 📦 Build, Fix & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code (with full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🧹 Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install

      - name: 🏗️ Attempt to build
        id: build
        continue-on-error: true
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MOYASAR_PUBLISHABLE_KEY: ${{ secrets.VITE_MOYASAR_PUBLISHABLE_KEY }}
          CI: false

      - name: 🔧 Auto-fix common errors
        if: steps.build.outcome == 'failure'
        run: |
          echo "🔍 Detecting and fixing errors..."
          
          # Fix: Missing dependencies
          if grep -q "Cannot find module" error.log 2>/dev/null || [ $? -eq 0 ]; then
            echo "📦 Installing missing modules..."
            npm install --legacy-peer-deps
          fi
          
          # Fix: TypeScript errors (TS2307)
          if grep -q "TS2307" error.log 2>/dev/null; then
            echo "📝 Fixing TypeScript module resolution..."
            npm install --save-dev @types/node @types/react @types/react-dom
          fi
          
          # Fix: Prisma errors (if any)
          if grep -q "prisma" error.log 2>/dev/null; then
            echo "🗑️ Removing prisma references..."
            npm uninstall prisma @prisma/client
            sed -i '/prisma/d' package.json
          fi
          
          # Fix: Express/Server errors
          if grep -q "express\|server.ts" error.log 2>/dev/null; then
            echo "🗑️ Removing server files..."
            rm -f server.ts || true
            sed -i '/tsx server.ts/d' package.json
          fi
          
          # Fix: Missing environment variables
          if grep -q "Missing Supabase environment" error.log 2>/dev/null; then
            echo "⚠️ Environment variables missing - check Netlify settings"
          fi
          
          # Reinstall and rebuild
          rm -rf node_modules package-lock.json
          npm install
          npm run build

      - name: ✅ Verify build success
        if: steps.build.outcome == 'failure'
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed after auto-fix attempts"
            exit 1
          fi

      - name: 🚀 Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "🚀 Auto-deploy from GitHub Actions (build: ${{ github.sha }})"
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

      - name: 🧹 Clear Netlify Cache
        if: success()
        run: |
          curl -X POST "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/clear_cache" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json"

      - name: 📊 Send notification on failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check GitHub Actions logs for details."
          # يمكن إضافة إشعار عبر Telegram/Slack/Email هنا
