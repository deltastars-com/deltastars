name: Delta Stars Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تم التحديث للنسخة v4 لتجنب الخطأ الأصفر
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # استخدام أحدث نسخة مستقرة
      - run: npm install
      - run: npm run build
