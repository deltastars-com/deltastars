    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- 3D & AR Engine -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --color-primary: #1a3a1a;
        --color-secondary: #FF922B;
        --font-main: 'IBM Plex Sans Arabic', 'Inter', sans-serif;
        --transition-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      * { 
        scrollbar-width: thin;
        scrollbar-color: #e2e8f0 transparent;
        -webkit-user-select: none;
        user-select: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: -0.01em;
        font-feature-settings: "cv01", "cv02", "cv03", "cv04", "cv05", "cv06", "cv08", "cv09", "cv10", "cv11";
      }

      input, textarea, [contenteditable="true"] {
        -webkit-user-select: text;
        user-select: text;
      }

      body { 
        font-family: var(--font-main); 
        background-color: #ffffff; 
        color: #0f172a;
        -webkit-tap-highlight-color: transparent; 
        overflow-x: hidden;
        margin: 0;
        padding: 0;
        line-height: 1.6;
      }

      .sovereign-shadow {
        box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.12);
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-thumb { 
        background: var(--color-primary); 
        border-radius: 20px;
      }

      #root { min-height: 100vh; display: flex; flex-direction: column; }

      /* Improved Model Viewer UI */
      model-viewer {
        width: 100%;
        height: 100%;
        background-color: transparent;
        --poster-color: transparent;
      }
      
      /* Global AR Button Style - Immersive Redesign */
      .ar-button {
        background-image: url(https://modelviewer.dev/assets/ic_view_in_ar_new_googblue_48dp.png);
        background-repeat: no-repeat;
        background-size: 36px 36px;
        background-position: 28px 50%;
        background-color: #ffffff;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
        bottom: 50px;
        padding: 0px 56px 0px 84px;
        font-family: 'Cairo', sans-serif;
        font-size: 20px;
        font-weight: 900;
        color: #1a3a1a;
        height: 84px;
        line-height: 84px;
        border-radius: 42px;
        border: 4px solid #FF922B;
        cursor: pointer;
        box-shadow: 0 35px 70px -15px rgba(0, 0, 0, 0.6);
        z-index: 100;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        animation: ar-pulse-sovereign 2.5s infinite;
        letter-spacing: -0.01em;
      }

      @keyframes ar-pulse-sovereign {
        0% { box-shadow: 0 0 0 0 rgba(255, 146, 43, 0.8); transform: translateX(-50%) scale(1); }
        70% { box-shadow: 0 0 0 35px rgba(255, 146, 43, 0); transform: translateX(-50%) scale(1.05); }
        100% { box-shadow: 0 0 0 0 rgba(255, 146, 43, 0); transform: translateX(-50%) scale(1); }
      }

      .ar-button:hover {
        background-color: #FF922B;
        color: #ffffff;
        border-color: #ffffff;
        transform: translateX(-50%) scale(1.1) translateY(-8px);
        background-image: url(https://modelviewer.dev/assets/ic_view_in_ar_new_googblue_48dp.png);
        filter: brightness(1.2) invert(0);
      }

      .ar-button:active {
        transform: translateX(-50%) scale(0.92);
      }

      #default-ar-button {
        display: none !important;
      }

      /* Scanning Pulse animation for Lab */
      .scan-pulse-line {
        animation: scan-vertical 5s linear infinite;
        background: linear-gradient(to bottom, 
          transparent 0%, 
          rgba(255, 146, 43, 0) 45%, 
          rgba(255, 146, 43, 0.9) 50%, 
          rgba(255, 146, 43, 0) 55%, 
          transparent 100%);
        height: 120px;
        width: 100%;
        position: absolute;
        pointer-events: none;
        z-index: 5;
      }

      @keyframes scan-vertical {
        0% { top: -20%; }
        100% { top: 120%; }
      }

      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-fade-in-up {
        animation: fade-in-up 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      /* Desktop Font Size Optimization */
      @media (min-width: 1024px) {
        html {
          font-size: 14px; /* Balanced base font for desktop elegance */
        }
        .hero-title {
          font-size: 6rem !important;
          line-height: 1 !important;
          letter-spacing: -0.04em !important;
        }
        .hero-subtitle {
          font-size: 2.2rem !important;
          max-width: 800px !important;
          margin-left: 0 !important;
          margin-right: 0 !important;
        }
        .container {
          max-width: 1400px !important;
        }
      }

      /* Mobile Font Size Optimization */
      @media (max-width: 768px) {
        html {
          font-size: 12px;
        }
        .hero-title {
          font-size: 3.5rem !important;
          line-height: 1.1 !important;
        }
        .hero-subtitle {
          font-size: 1.4rem !important;
          border-right-width: 4px !important;
          padding-right: 1rem !important;
        }
      }
    </style>

            backdropBlur: { '5xl': '120px', '6xl': '180px' }
