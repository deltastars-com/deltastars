[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  NODE_OPTIONS = "--max-old-space-size=4096"

[build.processing]
  skip_processing = false
  css_bundle = true
  js_bundle = true
  html_minify = true

[build.services]
  skip_services = false

# إعادة التوجيه لـ SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# منع التخزين المؤقت للملفات القديمة
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    Surrogate-Control = "no-store"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

# تحسين الصور
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# وظائف الحافة (إن وجدت)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# إعدادات المعاينة
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

[context.production]
  [context.production.environment]
    NODE_ENV = "production"

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
