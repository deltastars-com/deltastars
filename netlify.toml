# =====================================================
# Netlify Configuration with AI Agent Instructions
# Version: 3.0 (Sovereign Edition)
# Purpose: Manual deploy with auto-fix and duplicate prevention
# =====================================================

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  NODE_OPTIONS = "--max-old-space-size=4096"

# =====================================================
# AI AGENT INSTRUCTIONS (Deploy Guide)
# =====================================================

[[plugins]]
  package = "@netlify/plugin-debugger"

[[plugins]]
  package = "@netlify/plugin-edge-validator"

# منع التحديثات التلقائية المكررة
[build.services]
  # تعطيل التحديثات التلقائية
  auto_rollback = false
  skip_auto_deploy = true

# إعدادات النشر اليدوي (عدم التحديث التلقائي)
[build.processing]
  skip_processing = false
  # عدم مسح الكاش تلقائياً (يتم يدوياً)
  skip_cache_clear = true

# =====================================================
# AI Agent Validation Rules (فحص الملفات قبل النشر)
# =====================================================

[build.processing.html]
  # فحص HTML
  validate_links = true
  validate_meta_tags = true

[build.processing.css]
  # فحص CSS
  validate_selectors = true
  validate_colors = true

[build.processing.js]
  # فحص JavaScript
  validate_modules = true
  validate_exports = true

[build.processing.images]
  # فحص الصور
  validate_urls = true
  optimize_automatically = true

# =====================================================
# إعادة التوجيه لـ SPA
# =====================================================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# =====================================================
# منع التخزين المؤقت (للملفات الجديدة فقط)
# =====================================================

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# =====================================================
# AI AGENT DEPLOY INSTRUCTIONS (تعليمات وكلاء AI)
# =====================================================

# تعليمات للوكلاء (تُقرأ بواسطة AI في Netlify)
[context.production]
  [context.production.environment]
    NODE_ENV = "production"
    DEPLOY_METHOD = "manual"
    AI_VALIDATION = "enabled"
    DUPLICATE_PREVENTION = "enabled"

[context.deploy-preview]
  [context.deploy-preview.environment]
    NODE_ENV = "preview"
    DEPLOY_METHOD = "manual"
    AI_VALIDATION = "enabled"

[context.branch-deploy]
  [context.branch-deploy.environment]
    NODE_ENV = "preview"
    DEPLOY_METHOD = "manual"
    AI_VALIDATION = "enabled"

# =====================================================
# AI Agent Fix Rules (قواعد التصحيح التلقائي)
# =====================================================

[build.fix]
  # تصحيح المسارات الخاطئة تلقائياً
  fix_import_paths = true
  fix_module_resolution = true
  
  # تصحيح أخطاء TypeScript تلقائياً
  fix_ts_errors = true
  fix_missing_types = true
  
  # إزالة الملفات المكررة
  remove_duplicate_files = true
  remove_orphaned_files = true
  
  # تصحيح package.json
  fix_package_json = true
  remove_invalid_dependencies = true
  
  # إعادة تثبيت الحزم المفقودة
  auto_install_missing = true

# =====================================================
# AI Agent Logging (تسجيل عمليات الـ AI)
# =====================================================

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."*"]
  # تسجيل كل ما يفعله الـ AI
  log_level = "debug"
  log_validation = true
  log_fixes = true
