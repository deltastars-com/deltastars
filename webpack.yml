name: Build DeltaStars APK & iOS
on:
  push:
    branches: [ main ]
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm install
      - name: Build Web App
        run: npm run build
      - name: Capacitor Sync
        run: |
          npx cap add android
          npx cap sync android
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: DeltaStars-App
          path: android/app/build/outputs/apk/release/app-release.apk
